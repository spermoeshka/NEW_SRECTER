<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SPECTER VPN — Подключение</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#000; color:#fff; font-family:'Rajdhani',sans-serif;
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:2rem 1.5rem; text-align:center;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(0,255,136,0.08) 0%, transparent 60%);
    }
    .logo { font-size:2rem; font-weight:700; letter-spacing:0.2em; margin-bottom:0.3rem;
      background:linear-gradient(180deg,#fff 0%,#888 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .sub-title { font-family:'Space Mono',monospace; font-size:0.55rem; color:#444; letter-spacing:0.25em; margin-bottom:3rem; }
    .spinner { width:56px; height:56px; border:2px solid rgba(0,255,136,0.15);
      border-top-color:#00ff88; border-radius:50%; animation:spin 0.9s linear infinite; margin:0 auto 1.5rem; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .status { font-family:'Space Mono',monospace; font-size:0.7rem; color:#00ff88;
      letter-spacing:0.1em; animation:pulse 2s ease-in-out infinite; margin-bottom:0.5rem; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .hint { font-family:'Space Mono',monospace; font-size:0.62rem; color:#555; line-height:1.8; }
    .buttons { margin-top:2rem; display:flex; flex-direction:column; gap:0.8rem; width:100%; max-width:300px; }
    .btn { padding:1rem; border-radius:12px; font-family:'Rajdhani',sans-serif;
      font-size:1rem; font-weight:700; letter-spacing:0.1em; cursor:pointer;
      border:none; text-transform:uppercase; width:100%; }
    .btn-green { background:linear-gradient(135deg,#00ff88,#00cc6a); color:#000; box-shadow:0 0 20px rgba(0,255,136,0.25); }
    .btn-white { background:linear-gradient(135deg,#fff,#ccc); color:#000; }
    .btn-gray  { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12) !important; color:#666; font-size:0.8rem; }
    .step-block { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
      border-radius:12px; padding:1.2rem; margin-top:2rem; text-align:left; max-width:300px; width:100%; display:none; }
    .step-block-title { font-family:'Space Mono',monospace; font-size:0.6rem; color:#00ff88; letter-spacing:0.1em; margin-bottom:0.8rem; text-transform:uppercase; }
    .step { display:flex; gap:0.6rem; align-items:flex-start; margin-bottom:0.6rem; }
    .step-num { width:20px; height:20px; border-radius:50%; background:#00ff88; color:#000; font-size:0.65rem; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .step-text { font-family:'Space Mono',monospace; font-size:0.62rem; color:#666; line-height:1.6; }
    .back { margin-top:1.5rem; font-family:'Space Mono',monospace; font-size:0.6rem; color:#333; text-decoration:none; }
  </style>
</head>
<body>
  <div class="logo">SPECTER VPN</div>
  <div class="sub-title">SECURE · FAST · ZERO LOGS</div>

  <div class="spinner" id="spinner"></div>
  <div class="status" id="status">ОТКРЫВАЮ HAPP...</div>
  <div class="hint" id="hint">Подождите секунду...</div>

  <div class="buttons" id="btns" style="display:none;">
    <button class="btn btn-green" onclick="tryHapp()">📱 ОТКРЫТЬ В HAPP</button>
    <button class="btn btn-white" onclick="copyAndShow()">📋 СКОПИРОВАТЬ ССЫЛКУ</button>
  </div>

  <div class="step-block" id="manual-steps">
    <div class="step-block-title">Как вставить вручную:</div>
    <div class="step"><div class="step-num">1</div><div class="step-text">Открой Happ</div></div>
    <div class="step"><div class="step-num">2</div><div class="step-text">Нажми «+» справа сверху</div></div>
    <div class="step"><div class="step-num">3</div><div class="step-text">«Добавить подписку» → «Из буфера»</div></div>
    <div class="step"><div class="step-num">4</div><div class="step-text">Нажми подключить — готово! 🎉</div></div>
  </div>

  <a class="back" href="javascript:history.back()">← НАЗАД</a>

  <script>
    // Ссылка которая работает вручную — используем именно её
    var RAW = 'https://storage.yandexcloud.net/tariff20/отобранные.txt';

    function tryHapp() {
      // happ:// с незакодированной ссылкой — именно так работает вручную
      window.location.href = 'happ://add/sub?url=' + RAW;
    }

    function copyAndShow() {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(RAW);
      } else {
        var ta = document.createElement('textarea');
        ta.value = RAW;
        ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
        document.body.appendChild(ta);
        ta.select(); ta.setSelectionRange(0,9999);
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
      document.getElementById('manual-steps').style.display = 'block';
      document.getElementById('hint').textContent = '✓ Ссылка скопирована!';
    }

    // Запускаем сразу
    tryHapp();

    setTimeout(function() {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').textContent = 'ВЫБЕРИ СПОСОБ';
      document.getElementById('hint').textContent = 'Если Happ не открылся автоматически:';
      document.getElementById('btns').style.display = 'flex';
    }, 2000);
  </script>
</body>
</html>
