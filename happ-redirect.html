<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Открываю Happ...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; background:#000; color:#fff; font-family:sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; flex-direction:column; gap:1rem; text-align:center; padding:1rem; box-sizing:border-box; }
    .spinner { width:44px; height:44px; border:3px solid rgba(0,255,136,0.2); border-top-color:#00ff88; border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    p { font-size:0.9rem; color:#888; margin:0; }
    .btn { display:none; margin-top:1.5rem; padding:1rem 2rem; background:linear-gradient(135deg,#fff,#ccc); color:#000; border-radius:10px; text-decoration:none; font-weight:700; font-size:1rem; border:none; cursor:pointer; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>Открываю Happ...</p>
  <button class="btn" id="btn" onclick="go()">Нажми здесь</button>
  <script>
    function go() {
      // Строим ссылку через конкатенацию — браузер не трогает строковые переменные
      var base = 'https://storage.yandexcloud.net/tariff20/';
      var file = '\u043e\u0442\u043e\u0431\u0440\u0430\u043d\u043d\u044b\u0435'; // "отобранные" в unicode
      var ext  = '.txt';
      var link = 'happ://add/sub?url=' + base + file + ext;
      window.location.href = link;
    }

    // Запускаем сразу
    go();

    // Через 2 сек показываем кнопку если не сработало
    setTimeout(function() {
      document.getElementById('btn').style.display = 'inline-block';
    }, 2000);
  </script>
</body>
</html>
