<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SPECTER VPN — Подключение</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#000; color:#fff;
      font-family:'Rajdhani',sans-serif;
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:2rem 1.5rem; text-align:center;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(0,255,136,0.08) 0%, transparent 60%);
    }
    .logo { font-size:2rem; font-weight:700; letter-spacing:0.2em; margin-bottom:0.3rem;
      background:linear-gradient(180deg,#fff 0%,#888 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .sub { font-family:'Space Mono',monospace; font-size:0.55rem; color:#444; letter-spacing:0.25em; margin-bottom:3rem; }
    .spinner { width:56px; height:56px; border:2px solid rgba(0,255,136,0.15);
      border-top-color:#00ff88; border-radius:50%; animation:spin 0.9s linear infinite; margin:0 auto 1.5rem; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .status { font-family:'Space Mono',monospace; font-size:0.7rem; color:#00ff88;
      letter-spacing:0.1em; animation:pulse 2s ease-in-out infinite; margin-bottom:0.5rem; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .hint { font-family:'Space Mono',monospace; font-size:0.62rem; color:#444; line-height:1.8; }
    .buttons { margin-top:2.5rem; display:flex; flex-direction:column; gap:0.8rem; width:100%; max-width:300px; }
    .btn { padding:1rem; border-radius:12px; font-family:'Rajdhani',sans-serif;
      font-size:1rem; font-weight:700; letter-spacing:0.15em; cursor:pointer;
      border:none; text-transform:uppercase; width:100%; }
    .btn-primary { background:linear-gradient(135deg,#fff 0%,#c0c0c0 100%); color:#000;
      box-shadow:0 0 20px rgba(255,255,255,0.15); }
    .btn-sub { background:linear-gradient(135deg,#00ff88 0%,#00cc6a 100%); color:#000;
      box-shadow:0 0 20px rgba(0,255,136,0.2); }
    .btn-secondary { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.15) !important;
      color:#888; font-size:0.8rem; }
    .back { margin-top:1.5rem; font-family:'Space Mono',monospace;
      font-size:0.6rem; color:#333; text-decoration:none; letter-spacing:0.1em; }
  </style>
</head>
<body>
  <div class="logo">SPECTER VPN</div>
  <div class="sub">SECURE · FAST · ZERO LOGS</div>

  <div class="spinner"></div>
  <div class="status" id="status">ОТКРЫВАЮ HAPP...</div>
  <div class="hint" id="hint">Разрешите открытие приложения<br>когда появится запрос</div>

  <div class="buttons" id="btns" style="display:none;">
    <button class="btn btn-sub" onclick="trySubLink()">🔗 ПОПРОБОВАТЬ SUB://</button>
    <button class="btn btn-primary" onclick="tryHappLink()">📱 ОТКРЫТЬ HAPP://</button>
    <button class="btn btn-secondary" onclick="copyUrl()">📋 СКОПИРОВАТЬ ССЫЛКУ</button>
  </div>

  <a class="back" href="javascript:history.back()">← НАЗАД</a>

  <script>
    // Два варианта deep link — sub:// и happ://
    var SUB_URL  = 'sub://aHR0cHM6Ly9zdG9yYWdlLnlhbmRleGNsb3VkLm5ldC90YXJpZmYyMC8lRDAlQkUlRDElODIlRDAlQkUlRDAlQjElRDElODAlRDAlQjAlRDAlQkQlRDAlQkQlRDElOEIlRDAlQjUudHh0';
    var HAPP_URL = 'happ://add/sub?url=https://storage.yandexcloud.net/tariff20/%D0%BE%D1%82%D0%BE%D0%B1%D1%80%D0%B0%D0%BD%D0%BD%D1%8B%D0%B5.txt';
    var RAW_URL  = 'https://storage.yandexcloud.net/tariff20/%D0%BE%D1%82%D0%BE%D0%B1%D1%80%D0%B0%D0%BD%D0%BD%D1%8B%D0%B5.txt';

    function trySubLink()  { window.location.href = SUB_URL; }
    function tryHappLink() { window.location.href = HAPP_URL; }
    function copyUrl() {
      if (navigator.clipboard) { navigator.clipboard.writeText(RAW_URL); }
      else {
        var ta = document.createElement('textarea');
        ta.value = RAW_URL; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      }
      alert('Ссылка скопирована!\nВставь в Happ → + → Из буфера');
    }

    // Пробуем sub:// первым — он нативно поддерживается Happ
    trySubLink();

    setTimeout(function() {
      document.getElementById('status').textContent = 'НЕ ОТКРЫЛОСЬ?';
      document.getElementById('hint').textContent = 'Выбери способ подключения';
      document.getElementById('btns').style.display = 'flex';
    }, 2500);
  </script>
</body>
</html>
