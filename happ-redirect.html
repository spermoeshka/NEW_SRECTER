<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Открываю Happ...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; background:#000; color:#fff; font-family:sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; flex-direction:column; gap:1rem; text-align:center; padding:1rem; box-sizing:border-box; }
    .spinner { width:44px; height:44px; border:3px solid rgba(0,255,136,0.2); border-top-color:#00ff88; border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    p { font-size:0.9rem; color:#888; margin:0; }
    .manual { display:none; margin-top:1rem; padding:0.8rem 1.5rem; background:linear-gradient(135deg,#fff,#ccc); color:#000; border-radius:10px; text-decoration:none; font-weight:700; font-size:0.9rem; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>Открываю Happ...</p>
  <p style="font-size:0.75rem;color:#555;margin-top:0.5rem;">Если не открылось — нажми кнопку</p>
  <a id="manual" class="manual" href="#">Открыть вручную</a>
  <script>
    var sub = decodeURIComponent('%D0%BE%D1%82%D0%BE%D0%B1%D1%80%D0%B0%D0%BD%D0%BD%D1%8B%D0%B5');
    var happUrl = 'happ://add/sub?url=https://storage.yandexcloud.net/tariff20/' + sub + '.txt';
    window.location.href = happUrl;
    setTimeout(function() {
      var a = document.getElementById('manual');
      a.href = happUrl;
      a.style.display = 'inline-block';
    }, 2000);
  </script>
</body>
</html>
